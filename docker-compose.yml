version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: leave-management-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-leavedb}
      POSTGRES_USER: ${DB_USER:-leaveuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-leavepass}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-leaveuser} -d ${DB_NAME:-leavedb}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - leave-management-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: leave-management-app
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-leavedb}
      DB_USER: ${DB_USER:-leaveuser}
      DB_PASSWORD: ${DB_PASSWORD:-leavepass}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
    ports:
      - "${APP_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - leave-management-network
    restart: unless-stopped

volumes:
  postgres-data:
    driver: local

networks:
  leave-management-network:
    driver: bridge
