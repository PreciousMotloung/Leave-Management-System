spring.application.name=Leave Management Service Test

# H2 In-Memory Database for Testing
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Flyway Configuration (disable for tests, using ddl-auto instead)
spring.flyway.enabled=false

# JWT Configuration
jwt.secret=testSecretKeyForJWTTokenGenerationInTestEnvironmentMustBeAtLeast256Bits
jwt.expiration=86400000

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.com.precious.leavemanagement=DEBUG
